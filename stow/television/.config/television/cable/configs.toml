[metadata]
name = "configs"
description = "A channel to select from your user's dotfiles"
requirements = ["fd", "bat"]

[source]
command = ["fd -t d . $HOME/.config", "fd -t d --hidden . $HOME/.config"]

[preview]
command = "eza -1 --color=always '{}'"

[keybindings]
shortcut = "f2"
enter = "actions:cd"

[actions.cd]
description = "Open a shell in the selected directory"
command = "cd '{}' && $SHELL"
mode = "execute"

[actions.goto_parent_dir]
description = "Re-opens tv in the parent directory"
command = "tv dirs .."
mode = "execute"

