# [Main Settings]
shell /bin/zsh
term xterm-256color

# [Battery & Performance - CRITICAL]
repaint_delay 50
input_delay 10
sync_to_monitor yes
cursor_blink_interval 0
cursor_trail 0
visual_bell_duration 0

# Stops audio hardware from waking up
enable_audio_bell no
window_alert_on_bell no
update_check_interval 0

# Disables mouse timer
mouse_hide_wait 0

# SAVES CPU: Stops scanning text under mouse
detect_urls no

# SAVES CPU: Stops expensive font math
disable_ligatures never

# SAVES CPU: Stops shell from changing cursor
shell_integration no-cursor

# Ask for confirmation when closing an OS window
confirm_os_window_close 0

# [Rendering Expense]
background_opacity 1.0
background_blur 0

# [Wayland Specifics]
linux_display_server wayland
# Disable IME to reduce input loop processing overhead on Wayland
wayland_enable_ime no

# [Font Configuration]
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0

# Replicating line-height=25px 
# (12pt is ~16px, so we add 9px or use a multiplier)
adjust_line_height 3

# FIXED: changed line_height to cell_height
modify_font cell_height 110%
modify_font baseline 0px

# [Window Settings]
window_padding_width 7 7
remember_window_size  no
initial_window_width  140c
initial_window_height 30c

# Prevents programs from changing the title
# Disables window title updates
shell_integration no-title

allow_remote_control yes
listen_on unix:/tmp/mykitty

# [Scrollback]
scrollback_lines 2000
wheel_scroll_multiplier 40.0
touch_scroll_multiplier 40.0

# [Cursor & Mouse]
cursor_shape block
focus_follows_mouse no

# [Colors] Catppuccin Mocha
cursor #00caca 
cursor_text_color background
foreground #D8DEE9 
background #1E1E2E 
selection_foreground    #1e1e2e
selection_background    #f5e0dc

#: black
color8 #4C566A 
color0 #156BDC
#: red
color1 #F22C57
color9 #BF616A
#: green
color2 #2AACAA
color10 #A3BE8C
#: yellow
color3  #EBCB8B
color11 #EBCB8B
#: blue
color4  #F77067
color12 #81A1C1
#: magenta
color5  #B48EAD
color13 #B48EAD
#: cyan
color6  #88C0D0
color14 #8FBCBB
#: white
color7  #E5E9F0
color15 #ECEFF4

# [Key Bindings]
clear_all_shortcuts yes

# Clipboard
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map shift+insert paste_from_selection

# Font Size
map ctrl+equal change_font_size all +2.0
map ctrl+plus  change_font_size all +2.0
map ctrl+minus change_font_size all -2.0
map ctrl+0     change_font_size all 0

# Fullscreen
map f11 toggle_fullscreen

# Scrollback
map alt+shift+k scroll_line_up
map alt+shift+j scroll_line_down
map ctrl+shift+k scroll_page_up
map ctrl+shift+j scroll_page_down
map shift+home scroll_home
map shift+end scroll_end

# [Text Bindings]
map alt+r send_text all \x12
map ctrl+delete send_text all \x1b\x44
map ctrl+backspace send_text all \x17
map alt+h send_text all \x1b[D
map alt+ctrl+shift+h send_text all \xff95
# map alt+j send_text all \x1b[B
map alt+shift+l send_text all \x1bf
map alt+shift+h send_text all \x1bb
# map alt+k send_text all \x1b[A
map alt+l send_text all \x1b[C

# Word navigation
map ctrl+left send_text all \x1b[1;5D
map ctrl+right send_text all \x1b[1;5C

